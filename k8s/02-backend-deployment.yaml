apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: snapsure
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: snapsure-backend:latest
        imagePullPolicy: Never  # Use locally built image
        ports:
        - containerPort: 8000
          name: http
        envFrom:
        - configMapRef:
            name: backend-config
        volumeMounts:
        - name: weights
          mountPath: /app/weights
          readOnly: true
        # Health check: probe /health endpoint
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        # Resource limits
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
      volumes:
      - name: weights
        hostPath:
          path: "/run/desktop/mnt/host/c/Users/Akhila/OneDrive/Desktop/sample projects/SnapSure/weights"
          type: Directory
