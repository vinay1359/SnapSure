apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: snapsure
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
      - name: prepare-model-cache
        image: busybox:1.36
        command:
        - sh
        - -c
        - mkdir -p /model-cache/huggingface /model-cache/torch && chown -R 10001:10001 /model-cache
        volumeMounts:
        - name: backend-model-cache
          mountPath: /model-cache
      containers:
      - name: backend
        image: snapsure-backend:latest
        imagePullPolicy: Never  # Use locally built image
        ports:
        - containerPort: 8000
          name: http
        envFrom:
        - configMapRef:
            name: backend-config
        volumeMounts:
        - name: backend-model-cache
          mountPath: /home/appuser/.cache
        # Health check: probe /health endpoint
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 60
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 5
        # Resource limits
        resources:
          requests:
            cpu: 100m
            memory: 1Gi
          limits:
            cpu: 500m
            memory: 4Gi
      volumes:
      - name: backend-model-cache
        hostPath:
          path: /data/snapsure/model-cache
          type: DirectoryOrCreate
