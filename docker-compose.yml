services:
  backend:
    container_name: snapsure-backend          # FIXED name — no more workspace-based auto names
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    env_file:
      - ./backend/.env.docker
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 120s           # gives time for Hugging Face model download and initialization

  frontend:
    container_name: snapsure-frontend
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    depends_on:
      backend:
        condition: service_healthy  # frontend waits until backend health passes
    ports:
      - "3000:3000"
    restart: unless-stopped
