services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: deepfake-backend
    env_file:
      - ./backend/.env.docker
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: deepfake-frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
